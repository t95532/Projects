# ── Browser ─────────────────────────────
browser:
  headless: false           # Set true to run silently
  slow_mo_ms: 80            # Slow down automation (less bot-like)
  human_delay_min_ms: 500   # Random delay range between actions
  human_delay_max_ms: 1800
